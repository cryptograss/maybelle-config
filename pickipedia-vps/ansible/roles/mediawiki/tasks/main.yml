---
# MediaWiki configuration and secrets
# Code is deployed by Jenkins (rsync) and served by Docker container
# This role handles: directories, secrets, cron jobs

- name: Create web root directory
  file:
    path: "{{ mediawiki_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Create images directory
  file:
    path: "{{ mediawiki_root }}/images"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Create cache directory
  file:
    path: "{{ mediawiki_root }}/cache"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

# NOTE: LocalSettings.php is deployed by Jenkins from the pickipedia repo.
# This ansible role handles secrets in LocalSettings.local.php.

- name: Fetch GlitchTip DSN from maybelle
  uri:
    url: "https://glitchtip-dsn.maybelle.cryptograss.live/pickipedia-dsn.txt"
    user: deploy
    password: "{{ glitchtip_dsn_fetch_password }}"
    force_basic_auth: true
    return_content: true
  register: glitchtip_dsn_response

- name: Create LocalSettings.local.php with secrets
  copy:
    dest: "{{ mediawiki_root }}/LocalSettings.local.php"
    content: |
      <?php
      # PickiPedia secrets - managed by ansible, NOT checked into version control

      # Database (connects via socket mounted into Docker container)
      $wgDBtype = "mysql";
      $wgDBserver = "localhost";
      $wgDBname = "{{ db_name }}";
      $wgDBuser = "{{ db_user }}";
      $wgDBpassword = "{{ pickipedia_db_password }}";

      # Security keys
      $wgSecretKey = "{{ pickipedia_secret_key }}";
      $wgUpgradeKey = "{{ pickipedia_upgrade_key }}";

      # Sentry/GlitchTip error tracking
      $wgSentryDsn = "{{ glitchtip_dsn_response.content | trim }}";

      # Delivery-kid pinning service API key
      $wgDeliveryKidApiKey = "{{ delivery_kid_api_key }}";
    owner: www-data
    group: www-data
    mode: '0600'

- name: Create job runner script (runs inside Docker container)
  copy:
    dest: /usr/local/bin/mediawiki-jobs.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Run MediaWiki job queue inside Docker container
      docker exec pickipedia-wiki php /var/www/html/maintenance/runJobs.php --maxjobs=50 --maxtime=60 2>&1 | logger -t mediawiki-jobs

- name: Schedule MediaWiki job runner
  ansible.builtin.cron:
    name: "mediawiki job queue"
    minute: "*/5"
    job: "/usr/local/bin/mediawiki-jobs.sh"

- name: Set permissions on MediaWiki directories
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
    recurse: yes
  loop:
    - "{{ mediawiki_root }}/images"
    - "{{ mediawiki_root }}/cache"

- name: Create migration import script
  copy:
    dest: /usr/local/bin/import-pickipedia-backup.sh
    mode: '0750'
    content: |
      #!/bin/bash
      # Import PickiPedia backup from maybelle
      set -euo pipefail

      BACKUP_HOST="{{ backup_host }}"
      BACKUP_PATH="{{ backup_path }}"
      MW_ROOT="{{ mediawiki_root }}"

      echo "=== PickiPedia Migration Import ==="
      echo ""

      # Find latest database backup
      echo "Fetching latest database backup from $BACKUP_HOST..."
      LATEST_DB=$(ssh root@$BACKUP_HOST "ls -t $BACKUP_PATH/pickipedia_*.sql.gz 2>/dev/null | head -1")

      if [ -z "$LATEST_DB" ]; then
          echo "ERROR: No database backup found on $BACKUP_HOST"
          exit 1
      fi

      echo "Found: $LATEST_DB"

      # Download and import database
      echo "Downloading database backup..."
      scp root@$BACKUP_HOST:$LATEST_DB /tmp/pickipedia-import.sql.gz

      echo "Importing database (this may take a while)..."
      gunzip -c /tmp/pickipedia-import.sql.gz | mysql {{ db_name }}

      echo "Database imported successfully."

      # Import images
      echo ""
      echo "Syncing images from $BACKUP_HOST..."
      rsync -avz --progress root@$BACKUP_HOST:$BACKUP_PATH/images/ $MW_ROOT/images/

      echo "Images synced."

      # Fix ownership
      chown -R www-data:www-data $MW_ROOT/images

      # Run MediaWiki update inside container
      echo ""
      echo "Running MediaWiki update script..."
      docker exec pickipedia-wiki php /var/www/html/maintenance/update.php --quick

      # Restart container to pick up changes
      docker restart pickipedia-wiki

      echo ""
      echo "=== Import Complete ==="
      echo ""
      echo "Test: curl -I https://{{ domain_name }}/wiki/Main_Page"

      # Cleanup
      rm -f /tmp/pickipedia-import.sql.gz

---
- name: Check if IPFS is installed
  command: which ipfs
  register: ipfs_check
  ignore_errors: yes
  changed_when: false

- name: Download IPFS (Kubo)
  get_url:
    url: "https://dist.ipfs.tech/kubo/v{{ ipfs_version }}/kubo_v{{ ipfs_version }}_linux-amd64.tar.gz"
    dest: /tmp/kubo.tar.gz
  when: ipfs_check.rc != 0

- name: Extract IPFS
  unarchive:
    src: /tmp/kubo.tar.gz
    dest: /tmp
    remote_src: yes
  when: ipfs_check.rc != 0

- name: Install IPFS binary
  command: /tmp/kubo/install.sh
  when: ipfs_check.rc != 0

- name: Create IPFS user
  user:
    name: ipfs
    system: yes
    home: /var/lib/ipfs
    shell: /bin/false
    create_home: yes

- name: Initialize IPFS
  become_user: ipfs
  command: ipfs init --profile server
  args:
    creates: /var/lib/ipfs/.ipfs/config
  environment:
    IPFS_PATH: /var/lib/ipfs/.ipfs

# Split datastore: move blocks to Storage Box, keep metadata local
- name: Check if blocks directory is already a symlink
  stat:
    path: /var/lib/ipfs/.ipfs/blocks
  register: blocks_stat

- name: Stop IPFS before moving blocks (if running)
  systemd:
    name: ipfs
    state: stopped
  ignore_errors: yes
  when:
    - storage_box_mount is defined
    - blocks_stat.stat.exists
    - not blocks_stat.stat.islnk

- name: Move existing blocks to Storage Box
  command: mv /var/lib/ipfs/.ipfs/blocks {{ storage_box_mount }}/ipfs-blocks/blocks
  when:
    - storage_box_mount is defined
    - blocks_stat.stat.exists
    - not blocks_stat.stat.islnk
    - blocks_stat.stat.isdir

- name: Remove blocks directory if empty
  file:
    path: /var/lib/ipfs/.ipfs/blocks
    state: absent
  when:
    - storage_box_mount is defined
    - blocks_stat.stat.exists
    - not blocks_stat.stat.islnk

- name: Create blocks directory on Storage Box
  file:
    path: "{{ storage_box_mount }}/ipfs-blocks/blocks"
    state: directory
    owner: ipfs
    group: ipfs
    mode: '0755'
  when: storage_box_mount is defined

- name: Symlink blocks to Storage Box
  file:
    src: "{{ storage_box_mount }}/ipfs-blocks/blocks"
    dest: /var/lib/ipfs/.ipfs/blocks
    state: link
    owner: ipfs
    group: ipfs
  when: storage_box_mount is defined
  notify: restart ipfs

- name: Configure IPFS storage max
  become_user: ipfs
  command: "ipfs config Datastore.StorageMax {{ ipfs_storage_max }}"
  environment:
    IPFS_PATH: /var/lib/ipfs/.ipfs
  changed_when: false

- name: Configure IPFS API address
  become_user: ipfs
  command: ipfs config Addresses.API /ip4/127.0.0.1/tcp/5001
  environment:
    IPFS_PATH: /var/lib/ipfs/.ipfs
  changed_when: false

- name: Configure IPFS gateway address
  become_user: ipfs
  command: ipfs config Addresses.Gateway /ip4/127.0.0.1/tcp/8080
  environment:
    IPFS_PATH: /var/lib/ipfs/.ipfs
  changed_when: false

- name: Create IPFS systemd service
  copy:
    dest: /etc/systemd/system/ipfs.service
    mode: '0644'
    content: |
      [Unit]
      Description=IPFS Daemon
      After=network.target remote-fs.target
      Wants=remote-fs.target

      [Service]
      Type=simple
      User=ipfs
      Environment=IPFS_PATH=/var/lib/ipfs/.ipfs
      ExecStart=/usr/local/bin/ipfs daemon --enable-gc
      Restart=on-failure
      RestartSec=10

      [Install]
      WantedBy=multi-user.target
  notify: restart ipfs

- name: Enable and start IPFS
  systemd:
    name: ipfs
    enabled: yes
    state: started
    daemon_reload: yes

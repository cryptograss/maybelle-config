---
# Mount Hetzner Storage Box via CIFS/SMB

- name: Install CIFS utilities
  apt:
    name: cifs-utils
    state: present

- name: Create mount point for Storage Box
  file:
    path: "{{ storage_box_mount }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Create credentials file for Storage Box
  copy:
    dest: /etc/storage-box-credentials
    mode: '0600'
    content: |
      username={{ storage_box_user }}
      password={{ storage_box_password }}
  no_log: true

- name: Mount Storage Box via CIFS
  mount:
    path: "{{ storage_box_mount }}"
    src: "//{{ storage_box_host }}/backup"
    fstype: cifs
    opts: "credentials=/etc/storage-box-credentials,uid=ipfs,gid=ipfs,file_mode=0644,dir_mode=0755,_netdev,nofail"
    state: mounted

- name: Verify mount is working
  command: "df -h {{ storage_box_mount }}"
  register: storage_box_check
  changed_when: false

- name: Display Storage Box mount info
  debug:
    msg: "{{ storage_box_check.stdout }}"

- name: Create IPFS blocks directory on Storage Box
  file:
    path: "{{ storage_box_mount }}/ipfs-blocks"
    state: directory
    owner: ipfs
    group: ipfs
    mode: '0755'
